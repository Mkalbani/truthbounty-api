version: "3.9"

services:
  api:
    build: .
    container_name: truthbounty-api
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev

  postgres:
    image: postgres:15
    container_name: truthbounty-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: truthbounty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: truthbounty-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  